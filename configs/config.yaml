# ETL Pipeline Configuration

# Directory settings (relative to project root)
directories:
  raw_dir: "raw"
  normalized_dir: "normalized"
  datasets_dir: "datasets"

# Connectors settings
connectors:
  gmail:
    enabled: true
    source_dir: "tests/mock_data"
  whatsapp:
    enabled: true
    source_dir: "tests/mock_data"
    agent_names:
      - "Jane Doe"
      - "Agent Bob"
      - "Sonalika Rai DIBD Mentor"

# Normalizer settings
normalizer:
  company_domains:
    - "shop.com"
    - "support.shop.com"

# Thread Builder settings
thread_builder:
  gap_threshold_seconds: 86400  # 24 hours
  validator_report: "validation_report.json"

# Cleaner settings
cleaner:
  remove_duplicates: true
  autoreply_keywords:
    - "out of office"
    - "automatic reply"
    - "do-not-reply"
    - "auto-reply"
  low_quality_blacklist:
    - "ok"
    - "thanks"
    - "👍"
    - "hello"
    - "hi"
    - "thank you"
    - "k"

# Privacy Scrubber settings
privacy:
  report_filename: "privacy_report.json"
  api_key_env: "GROQ_API_KEY_SCRUBBING"
  model: "llama-3.1-8b-instant"

# Dataset Generator settings
dataset:
  version: "1.0.0"
  system_prompt: "You are a helpful customer support agent."
  jsonl_filename: "conversations.jsonl"
  metadata_filename: "metadata.json"
  statistics_filename: "statistics.json"

# Annotation settings
annotation:
  enabled: true
  api_key_env: "GROQ_API_KEY"
  model: "llama-3.1-8b-instant"
  intent_filename: "intent_labels.jsonl"
  sentiment_filename: "sentiment_labels.jsonl"
  summary_filename: "summaries.jsonl"

# RAG configuration settings
rag:
  enabled: true
  chunk_size_turns: 4
  chunk_overlap_turns: 2
  rag_filename: "rag_chunks.jsonl"

# Logging configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format_style: "text"  # 'text' or 'json'
  log_to_file: true
  log_filename: "etl_run.log"
